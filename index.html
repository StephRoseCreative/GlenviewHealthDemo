<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Daily Agenda</title>

<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#c9dfe4;
  font-family:'Poppins', sans-serif;
  color:#1c628d;
  overflow:hidden;
}

/* Decorative background SVG layer */
.bg-shapes {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.container {
  padding:80px 100px;
  height:100vh;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}

.header {
  text-align:center;
  margin-bottom:50px;
}

.header h1 {
  font-family:'League Spartan', sans-serif;
  font-size:64px;
  margin:0;
  color:#2a3a94;
}

.layout {
  display:grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap:60px;
}

.section-header {
  background:#4b757d;
  color:#fff;
  padding:18px;
  border-radius:14px;
  font-family:'League Spartan', sans-serif;
  font-size:28px;
  text-align:center;
  margin-bottom:20px;
}

.activity-row {
  display:grid;
  grid-template-columns:100px 1fr;
  margin-bottom:15px;
}

.time {
  background:#4b757d;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-weight:600;
}

.activity {
  background:#fffdf5;
  padding:15px 20px;
  border-radius:12px;
  margin-left:10px;
  font-weight:500;
  color:#2a3a94;
}

.reminder-box {
  background:#fffdf5;
  padding:25px;
  border-radius:14px;
  min-height:220px;
  color:#2a3a94;
  font-size:20px;
}

.weekly {
  display:none;
}

.week-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:15px;
}

.week-day {
  background:#fffdf5;
  border-radius:12px;
  padding:15px;
  text-align:center;
  font-size:16px;
  color:#2a3a94;
}

.banner {
  position:absolute;
  bottom:0;
  width:100%;
  background:#07ac61;
  color:#fff;
  font-size:24px;
  padding:12px 0;
  overflow:hidden;
}

.banner span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 20s linear infinite;
}

@keyframes scroll {
  0% { transform:translateX(0); }
  100% { transform:translateX(-100%); }
}

.page { display:none; }
.page.active { display:block; }

</style>
</head>

<body>

<!-- Decorative SVG Background -->
<svg class="bg-shapes">

  <!-- Top Left Soft Blob -->
  <circle cx="-200" cy="150" r="350" fill="#deeaed"></circle>

  <!-- Bottom Right Soft Curve -->
  <ellipse cx="100%" cy="100%" rx="400" ry="300" fill="#b2b8d3"></ellipse>

  <!-- Large Green Sparkle -->
  <polygon points="1600,350 1640,450 1740,490 1640,530 1600,630 1560,530 1460,490 1560,450"
           fill="#07ac61" opacity="0.9"/>

  <!-- Smaller Sparkle -->
  <polygon points="1500,750 1525,810 1585,835 1525,860 1500,920 1475,860 1415,835 1475,810"
           fill="#2fa76f" opacity="0.8"/>

</svg>

<div class="container">

<div class="page active" id="dailyPage">

  <div class="header">
    <h1 id="date"></h1>
  </div>

  <div class="layout">

    <div>
      <div class="section-header">Today's Activities</div>

      <div class="activity-row">
        <div class="time">9:00</div>
        <div class="activity" id="morning"></div>
      </div>

      <div class="activity-row">
        <div class="time">3:00</div>
        <div class="activity" id="afternoon"></div>
      </div>

      <div class="activity-row">
        <div class="time">7:00</div>
        <div class="activity" id="movieRow"></div>
      </div>
    </div>

    <div>
      <div class="section-header">Reminders</div>
      <div class="reminder-box">
        • <span id="reminder1"></span><br><br>
        • <span id="reminder2"></span>
      </div>
    </div>

  </div>

</div>

<div class="page weekly" id="weeklyPage">

  <div class="header">
    <h1>A Look at the Week</h1>
  </div>

  <div class="week-grid" id="weekGrid"></div>

</div>

</div>

<div class="banner">
  <span id="urgent"></span>
</div>

<script>

fetch("https://opensheet.elk.sh/19qGfblEVLezYvpctCS90aoj_5DOy9rrAbgcPBwVpHr0/Sheet1")
.then(res => res.json())
.then(data => {

  if (!data.length) return;
  const row = data[0];

  function clean(v) {
    return (v || "").replace(/"/g,"");
  }

  document.getElementById("date").innerText = clean(row.Date);
  document.getElementById("morning").innerText = clean(row["Morning Activity"]);
  document.getElementById("afternoon").innerText = clean(row["Afternoon Activity"]);
  document.getElementById("movieRow").innerText = clean(row.Movie);
  document.getElementById("reminder1").innerText = clean(row["Reminder 1"]);
  document.getElementById("reminder2").innerText = clean(row["Reminder 2"]);
  document.getElementById("urgent").innerText = clean(row["Urgent Banner"]);

});

// Page rotation (Daily ↔ Weekly)
let showWeekly = false;
setInterval(() => {
  showWeekly = !showWeekly;
  document.getElementById("dailyPage").classList.toggle("active");
  document.getElementById("weeklyPage").classList.toggle("active");
}, 25000);

</script>

</body>
</html>
