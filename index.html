<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="900">
<title>Glenview Health Display</title>

<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#c9dfe4;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  color:#2a3a94;
}

/* ===== BLOBS ===== */

.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.blob1{
  position:absolute;
  width:1100px;
  height:1100px;
  background:#deeaed;
  border-radius:50%;
  top:-450px;
  left:-300px;
}

.blob2{
  position:absolute;
  width:900px;
  height:900px;
  background:#b2b8d3;
  border-radius:50%;
  bottom:-350px;
  right:-250px;
}

.blob3{
  position:absolute;
  width:650px;
  height:650px;
  background:#79aab4;
  border-radius:50%;
  bottom:-250px;
  left:400px;
  opacity:.35;
}

/* ===== LOGO ===== */

.logo{
  position:absolute;
  top:60px;
  right:100px;
  width:240px;
}

/* ===== CONTAINER ===== */

.container{
  padding:120px 140px;
  height:100vh;
  box-sizing:border-box;
  position:relative;
}

.page{
  position:absolute;
  width:calc(100% - 280px);
  opacity:0;
  transition:opacity 1s ease;
}

.page.active{
  opacity:1;
}

/* ===== HEADINGS ===== */

.main-title{
  font-family:'League Spartan';
  font-weight:800;
  font-size:80px;
  margin:0 0 60px 0;
  color:#2a3a94;
}

/* ===== DAILY PAGE ===== */

.daily-layout{
  display:grid;
  grid-template-columns:1.3fr 0.7fr;
  gap:60px;
}

.section-label{
  font-family:'League Spartan';
  font-weight:600;
  font-size:20px;
  margin-bottom:8px;
  color:#4b757d;
}

.card{
  background:#fffdf5;
  border-radius:24px;
  padding:35px 45px;
  margin-bottom:40px;
}

.activity-text{
  font-family:'League Spartan';
  font-weight:700;
  font-size:34px;
  margin-top:5px;
}

.reminder-card{
  background:#fffdf5;
  border-radius:28px;
  padding:45px;
  font-size:22px;
  line-height:1.8;
}

/* ===== WEEK PAGE ===== */

.week-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:25px;
}

.week-day{
  display:flex;
  flex-direction:column;
}

.week-header{
  background:#2a3a94;
  color:#fff;
  padding:16px;
  border-radius:18px 18px 0 0;
  text-align:center;
  font-family:'League Spartan';
  font-weight:700;
}

.week-box{
  background:#fffdf5;
  padding:16px;
  border-bottom:1px solid #eee;
  font-size:16px;
}

.week-box:last-child{
  border-radius:0 0 18px 18px;
}

/* ===== URGENT ===== */

.banner{
  position:absolute;
  bottom:0;
  width:100%;
  background:#07ac61;
  color:#fff;
  font-weight:600;
  font-size:24px;
  padding:14px 0;
  overflow:hidden;
}

.banner span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 25s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

</style>
</head>

<body>

<div class="bg">
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="blob3"></div>
</div>

<img class="logo" src="https://i.imgur.com/8Qf6PzY.png">

<div class="container">

<!-- DAILY PAGE -->
<div class="page active" id="dailyPage">

<h1 class="main-title" id="date"></h1>

<div class="daily-layout">

<div>
  <div class="card">
    <div class="section-label">Morning</div>
    <div class="activity-text" id="morning"></div>
  </div>

  <div class="card">
    <div class="section-label">Afternoon</div>
    <div class="activity-text" id="afternoon"></div>
  </div>

  <div class="card">
    <div class="section-label">Movie</div>
    <div class="activity-text" id="movie"></div>
  </div>
</div>

<div class="reminder-card">
  <div class="section-label">Reminders</div>
  <div id="reminder1"></div><br>
  <div id="reminder2"></div>
</div>

</div>
</div>

<!-- WEEK PAGE -->
<div class="page" id="weekPage">

<h1 class="main-title">A Look at the Week</h1>

<div class="week-grid" id="weekGrid"></div>

</div>

</div>

<div class="banner">
  <span id="urgent"></span>
</div>

<script>

fetch("https://opensheet.elk.sh/19qGfblEVLezYvpctCS90aoj_5DOy9rrAbgcPBwVpHr0/Sheet1")
.then(res => res.json())
.then(data => {

if(!data.length) return;

function clean(v){
  return (v || "").replace(/"/g,"");
}

const row = data[0];

document.getElementById("date").innerText = clean(row.Date);
document.getElementById("morning").innerText = clean(row["Morning Activity"]);
document.getElementById("afternoon").innerText = clean(row["Afternoon Activity"]);
document.getElementById("movie").innerText = clean(row.Movie);
document.getElementById("reminder1").innerText = "• " + clean(row["Reminder 1"]);
document.getElementById("reminder2").innerText = "• " + clean(row["Reminder 2"]);
document.getElementById("urgent").innerText = clean(row["Urgent Banner"]);

/* WEEK GRID */

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const grid = document.getElementById("weekGrid");
grid.innerHTML = "";

days.forEach(day=>{
  grid.innerHTML += `
    <div class="week-day">
      <div class="week-header">${day}</div>
      <div class="week-box">${clean(row["Morning Activity"])}</div>
      <div class="week-box">${clean(row["Afternoon Activity"])}</div>
      <div class="week-box">${clean(row.Movie)}</div>
    </div>
  `;
});

});

/* PAGE ROTATION */

let showWeek = false;

setInterval(()=>{
  showWeek = !showWeek;
  document.getElementById("dailyPage").classList.toggle("active");
  document.getElementById("weekPage").classList.toggle("active");
}, 30000);

</script>

</body>
</html>
