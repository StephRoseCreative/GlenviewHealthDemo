<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="900">
<title>Glenview Health Display</title>

<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#c9dfe4;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  color:#2a3a94;
}

/* BACKGROUND */

.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.blob1{
  position:absolute;
  width:1100px;
  height:1100px;
  background:#deeaed;
  border-radius:50%;
  top:-450px;
  left:-300px;
}

.blob2{
  position:absolute;
  width:900px;
  height:900px;
  background:#b2b8d3;
  border-radius:50%;
  bottom:-350px;
  right:-250px;
}

.blob3{
  position:absolute;
  width:650px;
  height:650px;
  background:#79aab4;
  border-radius:50%;
  bottom:-250px;
  left:400px;
  opacity:.35;
}

/* LOGO PLACEHOLDER */

.logo-placeholder{
  position:absolute;
  top:60px;
  right:100px;
  width:240px;
  height:120px;
}

/* PAGE SYSTEM */

.container{
  padding:120px 140px;
  height:100vh;
  box-sizing:border-box;
  position:relative;
}

.page{
  position:absolute;
  width:calc(100% - 280px);
  opacity:0;
  transition:opacity 1s ease;
}

.page.active{
  opacity:1;
}

/* HEADINGS */

.main-title{
  font-family:'League Spartan';
  font-weight:800;
  font-size:80px;
  margin:0 0 60px 0;
}

/* CARDS */

.card{
  background:#fffdf5;
  border-radius:24px;
  padding:40px;
  margin-bottom:40px;
}

.section-label{
  font-family:'League Spartan';
  font-weight:600;
  font-size:22px;
  margin-bottom:10px;
  color:#4b757d;
}

.activity-text{
  font-family:'League Spartan';
  font-weight:700;
  font-size:38px;
}

/* PAGE 1 LAYOUT */

.daily-layout{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:40px;
}

/* PAGE 2 REMINDERS */

.reminder-big{
  background:#fffdf5;
  border-radius:30px;
  padding:60px;
  font-size:34px;
  line-height:1.8;
}

/* WEEK VIEW */

.week-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:25px;
}

.week-day{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.week-header{
  text-align:center;
  font-family:'League Spartan';
  font-weight:700;
  font-size:22px;
}

.week-card{
  background:#fffdf5;
  border-radius:18px;
  padding:16px;
  font-size:15px;
}

.week-label{
  font-weight:600;
  font-size:14px;
  margin-bottom:6px;
  color:#4b757d;
}

/* URGENT BANNER */

.banner{
  position:absolute;
  bottom:0;
  width:100%;
  height:100px;
  background:#d62828;
  color:#ffffff;
  font-family:'League Spartan';
  font-weight:800;
  font-size:44px;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.banner span{
  white-space:nowrap;
  padding-left:100%;
  animation:scroll 18s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

</style>
</head>

<body>

<div class="bg">
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="blob3"></div>
</div>

<div class="logo-placeholder"></div>

<div class="container">

<!-- PAGE 1: DAILY AGENDA -->
<div class="page active" id="page1">
  <h1 class="main-title" id="date"></h1>

  <div class="daily-layout">
    <div class="card">
      <div class="section-label">Morning</div>
      <div class="activity-text" id="morning"></div>
    </div>

    <div class="card">
      <div class="section-label">Afternoon</div>
      <div class="activity-text" id="afternoon"></div>
    </div>

    <div class="card">
      <div class="section-label">Movie</div>
      <div class="activity-text" id="movie"></div>
    </div>
  </div>
</div>

<!-- PAGE 2: REMINDERS -->
<div class="page" id="page2">
  <h1 class="main-title">Reminders</h1>

  <div class="reminder-big">
    <div id="reminder1"></div>
    <br>
    <div id="reminder2"></div>
  </div>
</div>

<!-- PAGE 3: WEEK VIEW -->
<div class="page" id="page3">
  <h1 class="main-title">A Look at the Week</h1>
  <div class="week-grid" id="weekGrid"></div>
</div>

</div>

<div class="banner">
  <span id="urgent"></span>
</div>

<script>

fetch("https://opensheet.elk.sh/19qGfblEVLezYvpctCS90aoj_5DOy9rrAbgcPBwVpHr0/Sheet1")
.then(res => res.json())
.then(data => {

if(!data.length) return;

function clean(v){
  return (v || "").replace(/"/g,"").trim();
}

const row = data[0];

document.getElementById("date").innerText = clean(row.Date);
document.getElementById("morning").innerText = clean(row["Morning Activity"]);
document.getElementById("afternoon").innerText = clean(row["Afternoon Activity"]);
document.getElementById("movie").innerText = clean(row.Movie);

document.getElementById("reminder1").innerText = "• " + clean(row["Reminder 1"]);
document.getElementById("reminder2").innerText = "• " + clean(row["Reminder 2"]);

const urgentText = clean(row["Urgent Banner"]);
document.getElementById("urgent").innerText = urgentText ? "⚠ " + urgentText : "";

/* WEEK GRID */
const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const grid = document.getElementById("weekGrid");

days.forEach(day=>{
  grid.innerHTML += `
    <div class="week-day">
      <div class="week-header">${day}</div>
      <div class="week-card"><div class="week-label">Morning</div>${clean(row["Morning Activity"])}</div>
      <div class="week-card"><div class="week-label">Afternoon</div>${clean(row["Afternoon Activity"])}</div>
      <div class="week-card"><div class="week-label">Movie</div>${clean(row.Movie)}</div>
    </div>
  `;
});

});

/* 3 PAGE ROTATION */
let pages = ["page1","page2","page3"];
let current = 0;

setInterval(()=>{
  document.getElementById(pages[current]).classList.remove("active");
  current = (current + 1) % pages.length;
  document.getElementById(pages[current]).classList.add("active");
}, 30000);

</script>

</body>
</html>
